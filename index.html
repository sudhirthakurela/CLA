    <title>Creative Learning Academy | Quality Child Care and Preschool</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p && p[1]) {
          var decoded = decodeURIComponent(p[1]);
          // Restore to /CLA/<decoded-path>
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null, base + '/' + decoded);
        }
      })();
    <\/script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
