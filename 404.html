<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Creative Learning Academy</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Converts the 404 path into a query string and redirects to index.html
      // which then reads it back and restores the correct route.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
