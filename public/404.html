<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Creative Learning Academy</title>
    <script>
      // GitHub Pages SPA redirect: strip the /CLA base, encode the rest
      (function() {
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 2).join('/'); // e.g. /CLA
        var rest = l.pathname.split('/').slice(2).join('/');    // e.g. about
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          base + '/?p=' + encodeURIComponent(rest) +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash
        );
      })();
    <\/script>
  </head>
  <body></body>
</html>
